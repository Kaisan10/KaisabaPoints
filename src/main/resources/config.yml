# かい鯖グループポイントプラグイン設定
# このファイルのバージョン（自動マイグレーション用・手動で変更しないでください）
config-version: 2

# ポイントシステム設定
points-system:
  # APIのURL
  api-url: "https://points.bac0n.f5.si"
  # APIのキー（skp_ で始まるキーを設定してください）
  api-key: ""
  # タイムアウト（秒）
  timeout: 10
  # 取引ポーリング間隔（秒）: pending_buyer 状態での確認間隔
  poll-interval-initial: 5
  # 長時間待機時のポーリング間隔（秒）: 30秒以上経過後
  poll-interval-long: 15

# PlaceholderAPI設定
placeholder:
  # キャッシュの有効期限（ミリ秒）
  # 5000 = 5秒、30000 = 30秒、60000 = 60秒、300000 = 5分、600000 = 10分
  cache-duration: 5000

# ショップ同期設定
shop-sync:
  # true にするとAPIサーバーとのショップ同期が有効になる
  enabled: false
  # ポーリング間隔（秒）: APIサーバーからの変更を取り込む頻度
  poll-interval: 60

# ショップ設定
shop:
  # true にするとプレイヤーが /shop create で個人ショップを作成できる
  # false にすると kaisabapoints.shop.admin 権限がないと作成不可
  player-create-enabled: true